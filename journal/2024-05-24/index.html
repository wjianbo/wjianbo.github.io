<h2></h2>




<article>
<p>昨天参加了一次饭局。在中野的一家居酒屋。请客的是一位年轻的创业者。他准备在日本创业，有一些需求。社长希望我们能做。</p>
<p>我怀疑社长是否高估了我的能力。但另一个我又很想证明自己：总说想做有挑战的工作，但挑战来了，我是否真能胜任。</p>
<p>闲聊时，晶说逛街的时候我会去书店，让她一个人逛。我觉得这种情况只是少数。不过我不讨厌这样的人设。我不知道是不是这样的道理：这种事她不太会做，而我却做了，哪怕只做过几次，它也会变成一个鲜明的印象。</p>
<p>晶说看电影的时候，我是哭得厉害的那个。我不知道这是否因为我感受到了一些不同的东西。如果是这样，那我可能有必要把这些东西写出来。</p>

</article>
