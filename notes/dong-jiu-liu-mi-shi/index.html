    <p>2023年底，我和晶搬到了东久留米市。这里和<a href="https://wjianbo.github.io/notes/da-tian-qu/">大田区</a>一样，地处东京边缘，邻近埼玉县。也许是因为太偏僻了，甚至有的日本同事听了都会问，那是哪里。</p>
<p>了解了一下东久留米市的历史。原来是先有东久留米车站，后来才有了东久留米市。</p>
