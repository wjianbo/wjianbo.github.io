    <p>2023年底，我和晶在日本买了房子。房子位于<a href="https://wjianbo.github.io/notes/dong-jiu-liu-mi-shi/">东久留米市</a>。两层，3LDK，带停车位。步行到最近的车站6分钟。</p>
<p>我还记得拿到钥匙那天是11月30日。我去中介公司拿钥匙，先到新家开通水电。晶在我们之前的出租屋，等着搬家公司上门。订购的新床也指定在当天送到新家。一天完成了很多事。</p>
