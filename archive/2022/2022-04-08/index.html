  <!-- 正文 -->
  <div class="post-content">
    <p>解决中日文乱码问题（Mac）</p>
<p>在 <code>~/.zshrc</code> 文件中添加</p>
<pre data-lang="shell" style="background-color:#2b303b;color:#c0c5ce;" class="language-shell "><code class="language-shell" data-lang="shell"><span>export LANG=en_US.UTF-8
</span></code></pre>
<p>然后执行 <code>source ~/.zshrc</code> 或重启一下 WezTerm 应该就可以了。</p>
<hr />
<h3 id="shortcuts">ShortCuts</h3>
<ul>
<li><a href="https://wezfurlong.org/wezterm/copymode.html">Copy Mode</a>
<ul>
<li>Enter copy mode: <code>CTRL-SHIFT-X</code></li>
<li>Toggle selection mode: <code>v</code></li>
<li>Copy: <code>CTRl-SHIFT-C</code></li>
<li>Exit copy mode: <code>Esc</code></li>
</ul>
</li>
</ul>
