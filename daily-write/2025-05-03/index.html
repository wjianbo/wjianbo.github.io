  <h1 class="pt-6">家务</h1>
  
  <p>今天又因为家务吵架。晶嫌我做饭把厨房弄的乱七八糟，没有像她一样一边做一边收拾。没有先把买回来的菜收进冰箱。没有先做好疙瘩汤，再去打蔬果汁。我怎么就没想到：她只有一张嘴，可以先吃疙瘩汤，再喝蔬果汁。</p>
