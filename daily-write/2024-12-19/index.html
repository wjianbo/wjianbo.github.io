  <h1 class="pt-6">《我可能错了》</h1>
  
  <p>记者问作者：在丛林中度过十七年的出家生活之后，你学到最重要的事是什么？</p>
<p>作者答道：</p>
<p>在这十七年日复一日的精神修炼中，我最珍视的一点就是：我对自己的每个念头，再也不相信了。</p>
