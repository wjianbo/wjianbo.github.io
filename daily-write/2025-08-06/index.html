  <h1 class="pt-6">凉拌土豆丝</h1>
  
  <p>料汁： 酱油、耗油、香油、盐、干辣椒段、蒜片，最后用热油一激。</p>
<p>土豆擦丝，沸水烫一分钟捞出，控干。
倒入刚刚调好的料汁，加香菜，抓拌均匀。</p>
