<h2>让世界变好</h2>




<p>在泳池看到一对中国人情侣，大概是在自学，我觉得我可以给他们指点一下，但是这种事对一个 I 人来说太难了，所以我只是看了一会儿就游走了。</p>
<p>从泳池回家的路上，脑中响起一个声音：</p>
<p><strong>你又错过了一次让世界变好的机会。</strong></p>
