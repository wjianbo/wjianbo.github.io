        </header>

        <div class="paper-body">
            <div class="library-reading">
                <p>因为心里烦躁，眼睛睁不开。
眼睛睁不开，就读不了报纸。
读不了报纸，只好发呆胡思乱想。
一胡思乱想，就意识到“死”的临近。
一意识到“死”的临近，就想在那之前好好享受一番。
一想要享受，就会想尝尝奢侈的美食。
一想吃奢侈的美食，就会想要零花钱。
一想要零花钱，就开始盘算要不要把书卖掉。
……不不不，书我可不想卖。
那就麻烦了。
一麻烦，心里就越发烦躁。</p>

        </div>
